name: Bug Report
description: Report a reproducible defect in Dezh.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For suspected vulnerabilities, use SECURITY.md instead of a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Provide exact commands, console input, or QEMU transcript.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - RISC-V boot
        - x86 smoke
        - process isolation
        - capabilities
        - typed IPC
        - service supervision
        - virtio-block daemon
        - package store
        - SDK tooling
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, QEMU version, branch, commit.
    validations:
      required: true
