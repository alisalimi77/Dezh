name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always

jobs:
  host:
    name: Host workspace tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run host workspace tests
        run: cargo test --locked --workspace

      - name: Run public review hygiene scan
        run: python3 tools/review/scan_public.py

  bare-metal:
    name: Bare-metal builds and QEMU smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64gc-unknown-none-elf,x86_64-unknown-none

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-misc qemu-system-x86

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build RISC-V kernel
        working-directory: dezh-boot
        run: cargo build --locked

      - name: Boot RISC-V kernel in QEMU
        run: >
          python3 tools/ci/qemu_smoke.py riscv64
          --kernel dezh-boot/target/riscv64gc-unknown-none-elf/debug/dezh-boot
          --qemu qemu-system-riscv64

      - name: Run SDK package install acceptance
        run: >
          python3 tools/ci/sdk_test.py
          --kernel dezh-boot/target/riscv64gc-unknown-none-elf/debug/dezh-boot
          --qemu qemu-system-riscv64

      - name: Run F1 agent-containment demo
        run: >
          python3 tools/demo/run_agent_demo.py
          --kernel dezh-boot/target/riscv64gc-unknown-none-elf/debug/dezh-boot
          --qemu qemu-system-riscv64
          --transcript /tmp/demo-transcript-agent-f1.md

      - name: Build x86_64 kernel
        working-directory: dezh-boot-x86
        run: cargo build --locked

      - name: Boot x86_64 kernel in QEMU
        run: >
          python3 tools/ci/qemu_smoke.py x86_64
          --kernel dezh-boot-x86/target/x86_64-unknown-none/debug/dezh-boot-x86
          --qemu qemu-system-x86_64
