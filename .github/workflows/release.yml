name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/dezh-review-env

jobs:
  release:
    name: Build review release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,riscv64gc-unknown-none-elf,x86_64-unknown-none,riscv64gc-unknown-linux-musl

      - name: Install QEMU and ISO tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-misc qemu-system-x86 \
            grub-pc-bin grub2-common xorriso mtools

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run public hygiene scan
        run: python3 tools/review/scan_public.py

      - name: Run host workspace tests
        run: cargo test --locked --workspace

      - name: Build RISC-V kernel
        working-directory: dezh-boot
        run: cargo build --locked

      - name: Build x86_64 kernel
        working-directory: dezh-boot-x86
        run: cargo build --locked

      - name: Run RISC-V QEMU smoke
        run: >
          python3 tools/ci/qemu_smoke.py riscv64
          --kernel dezh-boot/target/riscv64gc-unknown-none-elf/debug/dezh-boot
          --qemu qemu-system-riscv64

      - name: Run x86_64 QEMU smoke
        run: >
          python3 tools/ci/qemu_smoke.py x86_64
          --kernel dezh-boot-x86/target/x86_64-unknown-none/debug/dezh-boot-x86
          --qemu qemu-system-x86_64

      - name: Generate review transcript
        run: >
          python3 tools/demo/run_review_demo.py
          --kernel dezh-boot/target/riscv64gc-unknown-none-elf/debug/dezh-boot
          --qemu-riscv qemu-system-riscv64
          --mode short
          --no-build
          --transcript dist/release/demo-transcript-riscv64.md

      - name: Build release artifacts
        run: python3 tools/review/build_release_artifacts.py --tag "${{ github.ref_name }}"

      - name: Boot the release x86 ISO in QEMU (validate the artifact)
        run: >
          python3 tools/ci/qemu_smoke.py x86_64
          --iso dist/release/dezh-${{ github.ref_name }}-x86_64.iso
          --kernel dezh-boot-x86/target/x86_64-unknown-none/debug/dezh-boot-x86
          --qemu qemu-system-x86_64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dezh-${{ github.ref_name }}-review-artifacts
          path: dist/release/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          dist/release/*
          --title "Dezh OS ${{ github.ref_name }}"
          --notes-file docs/RELEASE_NOTES.md

      - name: Log in to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build review environment image
        run: >
          docker build
          -f Dockerfile.review
          -t "$REGISTRY_IMAGE:${{ github.ref_name }}"
          -t "$REGISTRY_IMAGE:latest"
          .

      - name: Publish review environment image
        run: |
          docker push "$REGISTRY_IMAGE:${{ github.ref_name }}"
          docker push "$REGISTRY_IMAGE:latest"
